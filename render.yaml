# render.yaml — Render Blueprint configuration for Unified Deployment
services:
  # --- Backend API Service ---
  - type: web
    name: cloudcalc-api
    plan: free
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set manually in Render dashboard
      - key: CORS_ORIGIN
        sync: false   # Set to your Frontend URL in Render dashboard
      - key: RATE_LIMIT_MAX
        value: "100"
    healthCheckPath: /api/health

  # --- Frontend Static Site ---
  - type: web
    name: cloudcalc-frontend
    plan: free
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        sync: false   # Set to your Backend URL in Render dashboard
    # Ensure React Router / SPAs work correctly on deep links
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
